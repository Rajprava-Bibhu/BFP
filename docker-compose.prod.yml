# =============================================================
# BizAuto — Production Docker Compose
# For local production simulation or single-server deployment.
# For AWS ECS, use the GitHub Actions CD pipeline instead.
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================

name: bizauto-prod

services:

  # ── API Server ───────────────────────────────────────────────
  api:
    image: ${ECR_IMAGE:-bizauto-api:latest}
    container_name: bizauto-api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus:   "1"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Nginx ─────────────────────────────────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: bizauto-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Static files served from the production image's /public
      # Mount or copy from the api container's /app/public
      - static_files:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  static_files:
