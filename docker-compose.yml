# =============================================================
# BizAuto — Local Development with Docker Compose
# Usage: docker compose up --build
# =============================================================

name: bizauto

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bizauto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bizauto
      POSTGRES_USER:     bizauto
      POSTGRES_PASSWORD: bizauto_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizauto -d bizauto"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bizauto-api
    restart: unless-stopped
    environment:
      NODE_ENV:       development
      PORT:           8080
      DATABASE_URL:   postgresql://bizauto:bizauto_dev@postgres:5432/bizauto
      JWT_SECRET:     dev_jwt_secret_change_in_production
      REFRESH_SECRET: dev_refresh_secret_change_in_production
      AWS_REGION:     ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME:  ${S3_BUCKET_NAME:-}
      S3_BUCKET_REGION: ${S3_BUCKET_REGION:-ap-south-1}
      CORS_ORIGIN:    http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx — Frontend + Reverse Proxy ────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: bizauto-web
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount built frontend — run `pnpm run build` first
      - ./artifacts/business-automation/dist/public:/usr/share/nginx/html:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
