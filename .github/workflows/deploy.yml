# =============================================================
# BizAuto — CD: Deploy to AWS ECS (Fargate)
# Triggers on push to main (after CI passes)
# =============================================================
# Required GitHub Secrets:
#   AWS_REGION              e.g. ap-south-1
#   AWS_ACCESS_KEY_ID       IAM key with ECR + ECS permissions
#   AWS_SECRET_ACCESS_KEY   IAM secret
#   ECR_REGISTRY            e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com
#   ECR_REPOSITORY          e.g. bizauto-api
#   ECS_CLUSTER             e.g. bizauto-cluster
#   ECS_SERVICE             e.g. bizauto-api-service
#   ECS_TASK_DEFINITION     e.g. bizauto-api  (task def family name)
#   CONTAINER_NAME          e.g. bizauto-api  (container in task def)
# =============================================================

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ──────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login to Amazon ECR ─────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file:    Dockerfile
          push:    true
          tags:    |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 5. Update ECS task definition ─────────────────────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ secrets.CONTAINER_NAME }}
          image:           ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      # ── 6. Deploy to ECS ──────────────────────────────────────
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:         ${{ steps.task-def.outputs.task-definition }}
          service:                 ${{ secrets.ECS_SERVICE }}
          cluster:                 ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── 7. Run DB migrations ──────────────────────────────────
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_REGION:   ${{ secrets.AWS_REGION }}
        run: |
          echo "Running DB migrations via ECS one-off task..."
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --launch-type FARGATE \
            --overrides '{"containerOverrides":[{"name":"${{ secrets.CONTAINER_NAME }}","command":["node","-e","require(\"./migrate.cjs\")"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.VPC_SUBNETS }}],securityGroups=[${{ secrets.VPC_SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER }} --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations completed successfully"

      # ── 8. Post-deploy summary ────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ secrets.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ secrets.ECS_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | \`$(date -u)\` |" >> $GITHUB_STEP_SUMMARY
