# =============================================================
# BizAuto — Nginx Configuration
# Serves the React SPA and proxies /api/* to the Node.js server
# =============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css text/xml text/javascript
                       application/json application/javascript application/xml+rss
                       application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstream: Node.js API server
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        # Redirect HTTP → HTTPS in production
        # Uncomment when TLS is configured via ALB or certbot:
        # return 301 https://$host$request_uri;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── API proxy ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering    off;
        }

        # ── Auth rate-limit ───────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Static assets (aggressive cache) ─────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires      1y;
            add_header   Cache-Control "public, immutable";
            access_log   off;
            try_files    $uri =404;
        }

        # ── React SPA — catch-all ─────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Health check (bypass rate limit) ─────────────────
        location = /health {
            access_log  off;
            add_header  Content-Type text/plain;
            return      200 "ok\n";
        }

        # ── Block hidden files ────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Max upload size ───────────────────────────────────
        client_max_body_size 15M;
    }
}
